<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xshare | Data Analytics Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e3a8a;
            --primary-light: #eff6ff;
            --success: #059669;
            --success-light: #ecfdf5;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #475569;
            --like: #e11d48;
            --bookmark: #d97706;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #94a3b8; 
            color: var(--text-main); 
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-body);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.15);
        }

        .header {
            position: sticky;
            top: 0;
            background-color: rgba(241, 245, 249, 0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .header-top { padding: 18px 20px 10px 20px; }
        .header-title { font-size: 1.3rem; font-weight: 800; color: var(--primary-dark); }

        .search-container { padding: 0 20px 12px 20px; display: none; }
        .search-container.active { display: block; }

        .search-bar {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
            outline: none;
        }

        .topics-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 14px 20px;
            gap: 8px;
            scrollbar-width: none;
        }
        .topics-scroll::-webkit-scrollbar { display: none; }

        .topic-pill {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .feed { padding: 16px; }

        .round-item {
            background: var(--bg-card);
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            box-shadow: var(--shadow-card);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .round-header {
            padding: 10px 16px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 14px 14px 0 0;
        }

        .round-header h3 { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .actions { display: flex; gap: 12px; }
        .action-btn { background: transparent; border: none; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 4px; font-weight: 700; font-size: 0.75rem; }
        .action-btn.liked { color: var(--like); }
        .action-btn.saved { color: var(--bookmark); }

        .qa-block { padding: 16px; }
        .qa-row { display: flex; gap: 12px; margin-bottom: 10px; }
        .indicator { min-width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.75rem; }
        .q-ind { color: var(--primary); background: var(--primary-light); }
        .a-ind { color: var(--success); background: var(--success-light); }

        .content h4 { font-size: 0.95rem; font-weight: 700; line-height: 1.4; margin-bottom: 4px; color: var(--text-main); }
        .content p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }

        .answer-wrapper { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-top: 1px solid var(--border);
            display: flex;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        .nav-item { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.6rem; font-weight: 800; gap: 4px; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="header-top"><div class="header-title" id="headerTitle">Data Analytics</div></div>
            <div class="search-container" id="searchContainer">
                <input type="text" id="searchInput" class="search-bar" placeholder="Search unique answers..." onkeyup="applyFilters()">
            </div>
            <div class="topics-scroll" id="topicScroll">
                <div class="topic-pill active" onclick="filterCategory('All', this)">All</div>
                <div class="topic-pill" onclick="filterCategory('SQL', this)">SQL</div>
                <div class="topic-pill" onclick="filterCategory('Excel', this)">Excel</div>
                <div class="topic-pill" onclick="filterCategory('Pandas', this)">Pandas</div>
                <div class="topic-pill" onclick="filterCategory('NumPy', this)">NumPy</div>
                <div class="topic-pill" onclick="filterCategory('Visualization', this)">Stats/Viz</div>
            </div>
        </header>

        <main class="feed" id="feedContainer">
            <div style="text-align:center; padding:50px; color:var(--primary); font-weight: 700;">Initializing Library...</div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" id="navHome" onclick="toggleView('home')">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span>
            </button>
            <button class="nav-item" id="navSearch" onclick="toggleView('search')">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>Search</span>
            </button>
            <button class="nav-item" id="navSaved" onclick="toggleView('saved')">
                <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg><span>Saved</span>
            </button>
        </nav>
    </div>

            sql.forEach(i => data.push({c: "SQL", q: i[0], a: i[1]}));
            excel.forEach(i => data.push({c: "Excel", q: i[0], a: i[1]}));

            numpy.forEach(i => data.push({c: "NumPy", q: i[0], a: i[1]}));

            return data;

        const DB_NAME = 'XShare_Insight_DB_V12'; // Incremented version to force update
        const STORE_NAME = 'qaStore';
        let db, activeData = [], currentCategory = 'All', currentView = 'home';

        async function initDB() {
            return new Promise((res) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => {
                    const store = e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    const raw = getUniqueData();
                    raw.forEach((d, i) => store.add({
                        id: i+1, 
                        c: d.c, 
                        q: d.q, 
                        a: d.a, 
                        saved: false, 
                        liked: false, 
                        likes: Math.floor(Math.random()*300 + 20)
                    }));
                };
                req.onsuccess = (e) => { db = e.target.result; res(); };
            });
        }

        async function loadData() {
            return new Promise(res => {
                db.transaction(STORE_NAME).objectStore(STORE_NAME).getAll().onsuccess = (e) => { 
                    activeData = e.target.result; 
                    res(); 
                };
            });
        }

        function renderFeed(data) {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';
            if (!data.length) { 
                container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--text-muted);">No insights match your criteria.</div>'; 
                return; 
            }

            data.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'round-item';
                div.innerHTML = `
                    <div class="round-header">
                        <h3>${item.c}</h3>
                        <div class="actions">
                            <button class="action-btn ${item.liked?'liked':''}" onclick="toggleLike(event, this, ${item.id})">
                                <i class="${item.liked?'fa-solid':'fa-regular'} fa-heart"></i> <span>${item.likes}</span>
                            </button>
                            <button class="action-btn ${item.saved?'saved':''}" onclick="toggleSave(event, this, ${item.id})">
                                <i class="${item.saved?'fa-solid':'fa-regular'} fa-bookmark"></i>
                            </button>
                        </div>
                    </div>
                    <div class="qa-block">
                        <div class="qa-row"><div class="indicator q-ind">Q</div><div class="content"><h4>${item.q}</h4></div></div>
                        <div class="answer-wrapper"><div class="qa-row"><div class="indicator a-ind">A</div><div class="content"><p>${item.a}</p></div></div></div>
                    </div>`;
                container.appendChild(div);
            });
        }

        function toggleLike(e, btn, id) {
            const item = activeData.find(d => d.id === id);
            item.liked = !item.liked; item.likes += item.liked ? 1 : -1;
            btn.classList.toggle('liked');
            btn.innerHTML = `<i class="${item.liked?'fa-solid':'fa-regular'} fa-heart"></i> <span>${item.likes}</span>`;
            db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(item);
        }

        function toggleSave(e, btn, id) {
            const item = activeData.find(d => d.id === id);
            item.saved = !item.saved;
            btn.classList.toggle('saved');
            btn.innerHTML = `<i class="${item.saved?'fa-solid':'fa-regular'} fa-bookmark"></i>`;
            db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(item);
        }

        function filterCategory(cat, el) {
            document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active'); 
            currentCategory = cat; 
            applyFilters();
        }

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            let filtered = [...activeData];
            if (currentView === 'saved') filtered = filtered.filter(d => d.saved);
            if (currentCategory !== 'All') filtered = filtered.filter(d => d.c === currentCategory);
            if (term) filtered = filtered.filter(d => d.q.toLowerCase().includes(term) || d.a.toLowerCase().includes(term));
            renderFeed(filtered);
        }

        function toggleView(view) {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
            document.getElementById('searchContainer').classList.toggle('active', view === 'search');
            document.getElementById('headerTitle').innerText = view === 'saved' ? 'Saved Insights' : 'Insights';
            applyFilters();
        }

        (async () => { 
            await initDB(); 
            await loadData(); 
            applyFilters(); 
        })();
    </script>
</body>
</html>

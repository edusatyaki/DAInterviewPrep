<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrepFeed | Pro Interview Flashcards</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #e2e8f0;
            --bg-app: #ffffff;
            --bg-hover: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #f1f5f9;
            
            --primary: #6366f1;      /* Indigo */
            --primary-light: #e0e7ff;
            --bookmark: #f59e0b;     /* Amber */
            --like: #ec4899;         /* Pink */
            --category-tag: #cbd5e1;
            
            /* Avatar Gradients */
            --avatar-bg: #0f172a;
            --avatar-glow: rgba(99, 102, 241, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--bg-app);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.08);
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
        }

        .header-title {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .search-container {
            padding: 0 20px 12px 20px;
            display: none;
        }
        .search-container.active { display: block; animation: slideDown 0.3s ease; }

        .search-bar {
            width: 100%;
            background-color: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .search-bar:focus {
            background-color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        /* Topics Scroll */
        .topics-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 16px 20px;
            gap: 10px;
            scrollbar-width: none; 
        }
        .topics-scroll::-webkit-scrollbar { display: none; } 

        .topic-pill {
            background-color: var(--bg-app);
            border: 1.5px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .topic-pill:hover { border-color: var(--category-tag); color: var(--text-main); }
        .topic-pill.active {
            background-color: var(--text-main);
            color: #ffffff;
            border-color: var(--text-main);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.15);
        }

        /* Feed */
        .feed {
            flex-grow: 1;
            padding-bottom: 80px; 
            overflow-y: auto;
        }

        .post {
            display: flex;
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            transition: background-color 0.2s;
            cursor: pointer;
        }
        .post:hover { background-color: var(--bg-hover); }

        /* UPGRADED Q BOX AVATAR */
        .post-avatar-wrapper {
            margin-right: 16px;
            flex-shrink: 0;
            position: relative;
        }
        
        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px var(--avatar-glow), inset 0 1px 1px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 2;
        }
        
        .post-avatar svg {
            width: 24px;
            height: 24px;
            fill: url(#avatarGradient);
            filter: drop-shadow(0 0 4px rgba(129, 140, 248, 0.8));
        }

        .post-content { flex-grow: 1; min-width: 0; }

        .post-meta {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        .post-author {
            font-weight: 800;
            color: var(--text-main);
            margin-right: 8px;
        }
        .post-category {
            color: var(--primary);
            font-weight: 700;
            background: var(--primary-light);
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .post-question {
            font-size: 1.15rem;
            line-height: 1.5;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
            word-wrap: break-word;
        }

        .post-answer-wrapper {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed #cbd5e1;
            animation: fadeIn 0.3s ease;
        }
        .post.open .post-answer-wrapper { display: block; }

        .post-answer {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .answer-label {
            display: inline-block;
            color: var(--primary);
            background-color: var(--primary-light);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Post Actions */
        .post-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            max-width: 280px;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .action-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .action-btn:hover { background-color: var(--border); }
        .action-btn.like-btn.liked { color: var(--like); }
        .action-btn.like-btn.liked svg { transform: scale(1.15); }
        .action-btn.save-btn.saved { color: var(--bookmark); }
        .action-btn.save-btn.saved svg { transform: scale(1.15); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            padding-bottom: env(safe-area-inset-bottom, 12px);
            z-index: 100;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            transition: color 0.2s;
        }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-item.active { color: var(--primary); }

        /* Utilities */
        #loader { display: flex; justify-content: center; align-items: center; height: 200px; color: var(--primary); font-weight: 700; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state svg { width: 48px; height: 48px; fill: var(--category-tag); margin-bottom: 16px; }
        .empty-state h3 { color: var(--text-main); margin-bottom: 8px; font-size: 1.2rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
      <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#818cf8" />
        <stop offset="100%" stop-color="#c084fc" />
      </linearGradient>
    </svg>

    <div class="app-container">
        <header class="header">
            <div class="header-top">
                <div class="header-title" id="headerTitle">For You</div>
            </div>
            
            <div class="search-container" id="searchContainer">
                <input type="text" id="searchInput" class="search-bar" placeholder="Search formulas, tools, or concepts..." onkeyup="searchQuestions()">
            </div>

            <div class="topics-scroll" id="topicScroll">
                <div class="topic-pill active" onclick="filterCategory('All', this)">All</div>
                <div class="topic-pill" onclick="filterCategory('Excel', this)">Excel</div>
                <div class="topic-pill" onclick="filterCategory('NumPy', this)">NumPy</div>
                <div class="topic-pill" onclick="filterCategory('Pandas', this)">Pandas</div>
                <div class="topic-pill" onclick="filterCategory('Matplotlib', this)">Matplotlib</div>
                <div class="topic-pill" onclick="filterCategory('Tableau', this)">Tableau</div>
                <div class="topic-pill" onclick="filterCategory('Statistics', this)">Statistics</div>
                <div class="topic-pill" onclick="filterCategory('Analysis', this)">Analysis</div>
            </div>
        </header>

        <main class="feed" id="feedContainer">
            <div id="loader">Initializing Database...</div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" id="navHome" onclick="toggleView('home')">
                <svg viewBox="0 0 24 24"><path d="M12 1.696l-10.99 9.948v10.66h21.98v-10.66L12 1.696zm-9 11.594l9-8.145 9 8.145v7.061h-18v-7.061z"></path><path d="M9 14h6v7H9z"></path></svg>
                <span>Home</span>
            </button>
            <button class="nav-item" id="navSearch" onclick="toggleView('search')">
                <svg viewBox="0 0 24 24"><path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"></path></svg>
                <span>Search</span>
            </button>
            <button class="nav-item" id="navSaved" onclick="toggleView('saved')">
                <svg viewBox="0 0 24 24"><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.224-.5.5v14.56l6-4.29 6 4.29V4.5c0-.276-.224-.5-.5-.5h-11z"></path></svg>
                <span>Bookmarks</span>
            </button>
        </nav>
    </div>

    <script>
        // 250 Condensed Questions Payload
        const compressedData = [
            // Excel (40)
            ["Excel", "VLOOKUP vs INDEX/MATCH?", "VLOOKUP searches right only. INDEX/MATCH is bidirectional and won't break if columns are inserted."],
            ["Excel", "Handle #N/A errors?", "Wrap your formula in IFERROR() to return a blank or custom text instead of the error."],
            ["Excel", "What is a Calculated Field in Pivot Tables?", "A custom field created by performing math on existing Pivot Table fields (e.g. = Profit / Sales)."],
            ["Excel", "Difference: COUNT, COUNTA, COUNTBLANK?", "COUNT measures numbers, COUNTA measures any non-empty cells, COUNTBLANK measures empty cells."],
            ["Excel", "Explain SUMPRODUCT.", "Multiplies arrays together and sums the total. Great for complex multi-criteria calculations."],
            ["Excel", "Absolute vs Relative references?", "Relative (A1) shifts when dragged. Absolute ($A$1) locks the exact cell."],
            ["Excel", "What is XLOOKUP?", "Modern VLOOKUP replacement. Defaults to exact match, searches any direction."],
            ["Excel", "How to extract first name?", "Use Text-to-Columns, or LEFT() combined with FIND(\" \")."],
            ["Excel", "What is Power Query?", "An ETL tool in Excel used to connect, clean, and shape massive data sources before loading."],
            ["Excel", "What is Power Pivot?", "Data Model add-in allowing multi-table relationships and DAX formulas for millions of rows."],
            ["Excel", "Goal Seek?", "A What-If tool that changes one input cell until a target formula reaches your desired value."],
            ["Excel", "Solver Add-in?", "Optimizes a target cell (max/min/value) by changing multiple variables subject to constraints."],
            ["Excel", "Dynamic Array Formulas?", "Modern functions (UNIQUE, FILTER, SORT) that automatically spill results into adjacent blank cells."],
            ["Excel", "Create a dependent drop-down?", "Use Data Validation with the INDIRECT function referencing the first drop-down cell."],
            ["Excel", "Circular reference?", "When a formula points back to its own cell, creating an infinite loop."],
            ["Excel", "What is Flash Fill?", "Excel's AI tool (Ctrl+E) that auto-fills data by recognizing patterns (like formatting phone numbers)."],
            ["Excel", "What does TRIM do?", "Removes all leading, trailing, and double spaces from a text string."],
            ["Excel", "What is OFFSET?", "Volatile function returning a range shifted a specific number of rows/cols from a starting cell."],
            ["Excel", "Find duplicates quickly?", "Use Conditional Formatting -> Highlight Cell Rules -> Duplicate Values."],
            ["Excel", "What does AGGREGATE do?", "Runs functions like SUM or AVERAGE but can ignore hidden rows, errors, and subtotals."],
            ["Excel", "How to lock specific cells?", "Format Cells -> Unlock desired cells -> Protect Sheet."],
            ["Excel", "What are Slicers?", "Visual, click-based filters for Pivot Tables and structured Excel Tables."],
            ["Excel", "What is a volatile function?", "Recalculates every time ANY cell changes (TODAY, NOW, OFFSET, INDIRECT), slowing down large files."],
            ["Excel", "Calculate days between dates?", "Subtract the older date from the newer date, or use DATEDIF()."],
            ["Excel", "What is the PMT function?", "Calculates the periodic payment for a loan assuming constant payments and interest rate."],
            ["Excel", "How to transpose data?", "Copy -> Paste Special -> Transpose, or use the =TRANSPOSE() array function."],
            ["Excel", "SUMIF vs SUMIFS?", "SUMIF handles one criteria. SUMIFS handles multiple (and puts the sum_range first)."],
            ["Excel", "Group Pivot Table by month?", "Right-click a date field in the Pivot -> Group -> Select Months and Years."],
            ["Excel", "What is EOMONTH?", "Returns the last day of the month, a specified number of months forward or backward."],
            ["Excel", "Trace Precedents?", "Auditing tool that draws arrows showing which cells affect the active cell's formula."],
            ["Excel", "Helper Column?", "An extra column created to break a highly complex formula into simpler, readable steps."],
            ["Excel", "Convert text to real dates?", "Use DATEVALUE() or Text-to-Columns specifying Date format."],
            ["Excel", "What is GETPIVOTDATA?", "Extracts data from a Pivot Table ensuring the correct value is pulled even if the layout changes."],
            ["Excel", "Highlight rows conditionally?", "Use Conditional Formatting with a formula rule (e.g., =$A1=\"Done\") applied to the whole table."],
            ["Excel", "What is a Macro?", "A recorded sequence of actions or VBA code to automate repetitive tasks."],
            ["Excel", "Line break inside a cell?", "Press Alt + Enter (Windows) or Option + Return (Mac)."],
            ["Excel", "EXACT function?", "Compares two strings and returns TRUE if exactly identical (case-sensitive)."],
            ["Excel", "Remove duplicates permanently?", "Select data -> Data Tab -> Remove Duplicates."],
            ["Excel", "Inner vs Left Join in Power Query?", "Inner keeps only matching rows. Left keeps all rows from the first table and matching from the second."],
            ["Excel", "Combine text from cells?", "Use CONCAT(), TEXTJOIN(), or the & operator."],
            
            // NumPy (35)
            ["NumPy", "What is an ndarray?", "A multidimensional, homogeneous array of fixed-size items, offering massive memory/speed efficiency."],
            ["NumPy", "What is Vectorization?", "Applying operations to an entire array at once without explicit Python loops, using underlying C code."],
            ["NumPy", "Explain Broadcasting.", "Rules allowing NumPy to do math on arrays of different shapes by conceptually stretching the smaller one."],
            ["NumPy", "np.zeros() vs np.empty()?", "zeros() fills with 0s. empty() allocates memory without initializing, leaving garbage values (slightly faster)."],
            ["NumPy", "Create sequence of numbers?", "np.arange(start, stop, step) or np.linspace(start, stop, num_elements)."],
            ["NumPy", "Change array dimensions?", "Use np.reshape(). The new shape must contain the exact same total number of elements."],
            ["NumPy", "flatten() vs ravel()?", "flatten() returns a copy. ravel() returns a memory-efficient view whenever possible."],
            ["NumPy", "How does np.where() work?", "Returns elements from x or y depending on a boolean condition: np.where(condition, x, y)."],
            ["NumPy", "Index of max value?", "Use np.argmax()."],
            ["NumPy", "What is Boolean Indexing?", "Passing an array of True/False values (mask) inside brackets to filter data (e.g., arr[arr > 5])."],
            ["NumPy", "np.dot() vs np.matmul()?", "Both do 2D matrix multiplication, but handle higher-dimensional arrays and scalars differently."],
            ["NumPy", "Stack arrays vertically?", "np.vstack() or np.concatenate(axis=0)."],
            ["NumPy", "What are Strides?", "Bytes to step in each dimension when traversing an array. Modifying strides allows zero-copy reshaping."],

            ["NumPy", "Handle missing values?", "Use np.nan to represent them, and np.isnan() or np.nanmean() to handle them."],
            ["NumPy", "Why use np.random.seed()?", "Ensures pseudo-random number generation produces the exact same results for reproducibility."],
            ["NumPy", "Generate normal distribution?", "np.random.normal(loc=mean, scale=std, size=shape)."],
            ["NumPy", "What is np.eye()?", "Creates a 2D array with 1s on the diagonal and 0s elsewhere (Identity matrix)."],

            ["NumPy", "What does np.clip() do?", "Limits values. Anything below min is set to min; anything above max is set to max."],

            ["NumPy", "What is np.meshgrid?", "Creates a rectangular grid from two 1D arrays, useful for 3D plotting."],
            ["NumPy", "Broadcasting rule?", "Dimensions must be equal, or one must be 1. Compared from trailing edges inward."],
            ["NumPy", "Get matrix diagonal?", "np.diag(matrix)."],
            ["NumPy", "Reverse 1D array?", "Slicing with a negative step: arr[::-1]."],
            ["NumPy", "Compute cross product?", "np.cross(a, b)."],
            ["NumPy", "Add new axis?", "Use np.newaxis or None in slicing: arr[:, np.newaxis]."],
            ["NumPy", "np.any()?", "Returns True if at least one element evaluates to True."],
            ["NumPy", "np.all()?", "Returns True only if every single element evaluates to True."],
            ["NumPy", "Repeat elements?", "Use np.repeat(arr, count)."],
            ["NumPy", "np.mean vs np.average?", "average() can take a weights array for weighted averages; mean() is strictly arithmetic mean."],

            // Pandas (40)
            ["Pandas", "Series vs DataFrame?", "A Series is a 1D column with an index. A DataFrame is a 2D table composed of multiple Series."],
            ["Pandas", "loc vs iloc?", "loc filters by index/column labels. iloc filters by integer position (0, 1, 2)."],

            ["Pandas", "Find duplicate rows?", "df.duplicated(). Drop them with df.drop_duplicates()."],

            ["Pandas", "Extract month from datetime?", "df['date'].dt.month."],
            ["Pandas", "One-hot encoding?", "Converting categorical text into binary (0/1) columns using pd.get_dummies()."],
            ["Pandas", "Optimize DataFrame memory?", "Downcast numeric types (float64 -> float32) and convert low-cardinality strings to 'category' dtypes."],

            ["Pandas", "Rename columns?", "df.rename(columns={'old': 'new'})."],

            ["Pandas", "Iterating over rows?", "Avoid iterrows() if possible; use vectorized operations or apply() because Python loops are slow."],
            ["Pandas", "set_index()?", "Sets an existing column as the new index (row labels) of the DataFrame."],
            ["Pandas", "Check for nulls?", "df.isna() or df.isnull(). Append .sum() to count them per column."],
            ["Pandas", "Replace specific values?", "df.replace({'old_val': 'new_val'})."],
            ["Pandas", "What is a Timedelta?", "Represents an absolute duration or difference between two datetime objects."],
            ["Pandas", "Append a row?", "Use pd.concat() to join the original DataFrame with a new one-row DataFrame."],
            ["Pandas", "map() vs applymap()?", "map() works on a Series. applymap() applies a function to every single element across an entire DataFrame."],

        // IndexedDB Configuration
        let db;
        let activeData = [];
        let currentCategory = 'All';
        let currentView = 'home';
        const DB_NAME = 'PrepFeedDB_V2';
        const STORE_NAME = 'qaStore';

        // SVGs
        const iconHeart = `<svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"></path></svg>`;
        const iconHeartFilled = `<svg viewBox="0 0 24 24"><path d="M20.884 13.19c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z" fill="currentColor"></path></svg>`;
        const iconBookmark = `<svg viewBox="0 0 24 24"><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.224-.5.5v14.56l6-4.29 6 4.29V4.5c0-.276-.224-.5-.5-.5h-11z"></path></svg>`;
        const iconBookmarkFilled = `<svg viewBox="0 0 24 24"><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5z" fill="currentColor"></path></svg>`;
        const iconSpark = `<svg viewBox="0 0 24 24"><path d="M11.5 2L10 11H3l9 11 1.5-9h7l-9-11z"/></svg>`;

        // IndexedDB Logic
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject("IndexedDB Error");
                
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        const store = database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        compressedData.forEach((d, i) => {
                            store.add({
                                id: i + 1, c: d[0], q: d[1], a: d[2],
                                saved: false, liked: false,
                                likesCount: Math.floor(Math.random() * 800) + 42
                            });
                        });
                    }
                };
            });
        }

        function loadData() {
            return new Promise((resolve) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => {
                    activeData = request.result;
                    resolve();
                };
            });
        }

        function updateDB(item) {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            transaction.objectStore(STORE_NAME).put(item);
        }

        // DOM Render
        const feedContainer = document.getElementById('feedContainer');
        function renderFeed(data) {
            feedContainer.innerHTML = '';
            
            if (data.length === 0) {
                feedContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        <h3>No matches found</h3>
                        <p>Try exploring another topic.</p>
                    </div>`;
                return;
            }

            data.forEach((item) => {
                const post = document.createElement('article');
                post.className = 'post';
                post.innerHTML = `
                    <div class="post-avatar-wrapper">
                        <div class="post-avatar">
                            ${iconSpark}
                        </div>
                    </div>
                    <div class="post-content">
                        <div class="post-meta">
                            <span class="post-author">Prep AI</span>
                            <span class="post-category">${item.c}</span>
                        </div>
                        <div class="post-question" onclick="toggleAnswer(this)">${item.q}</div>
                        <div class="post-answer-wrapper">
                            <span class="answer-label">Answer</span>
                            <div class="post-answer">${item.a}</div>
                        </div>
                        <div class="post-actions">
                            <button class="action-btn like-btn ${item.liked ? 'liked' : ''}" onclick="toggleLike(this, ${item.id})">
                                ${item.liked ? iconHeartFilled : iconHeart} 
                                <span>${item.likesCount}</span>
                            </button>
                            <button class="action-btn save-btn ${item.saved ? 'saved' : ''}" onclick="toggleSave(this, ${item.id})">
                                ${item.saved ? iconBookmarkFilled : iconBookmark}
                            </button>
                        </div>
                    </div>
                `;
                feedContainer.appendChild(post);
            });
        }

        // Interactions
        window.toggleAnswer = (el) => el.closest('.post').classList.toggle('open');

        window.toggleLike = (btn, id) => {
            const item = activeData.find(d => d.id === id);
            item.liked = !item.liked;
            item.likesCount += item.liked ? 1 : -1;
            updateDB(item);
            btn.classList.toggle('liked');
            btn.innerHTML = `${item.liked ? iconHeartFilled : iconHeart} <span>${item.likesCount}</span>`;
        };

        window.toggleSave = (btn, id) => {
            const item = activeData.find(d => d.id === id);
            item.saved = !item.saved;
            updateDB(item);
            btn.classList.toggle('saved');
            btn.innerHTML = item.saved ? iconBookmarkFilled : iconBookmark;
            if (currentView === 'saved' && !item.saved) applyFilters();
        };

        // Navigation & Filters
        window.filterCategory = (cat, el) => {
            document.querySelectorAll('.topic-pill').forEach(pill => pill.classList.remove('active'));
            el.classList.add('active');
            currentCategory = cat;
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.searchQuestions = () => applyFilters();

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let filtered = activeData;
            if (currentView === 'saved') filtered = filtered.filter(d => d.saved);
            if (currentCategory !== 'All') filtered = filtered.filter(d => d.c === currentCategory);
            if (q) filtered = filtered.filter(d => d.q.toLowerCase().includes(q) || d.a.toLowerCase().includes(q));
            renderFeed(filtered);
        }

        window.toggleView = (view) => {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');

            const title = document.getElementById('headerTitle');
            const searchBox = document.getElementById('searchContainer');
            const topicScroll = document.getElementById('topicScroll');

            if (view === 'search') {
                title.innerText = "Search";
                searchBox.classList.add('active');
                topicScroll.style.display = 'flex';
                document.getElementById('searchInput').focus();
            } else if (view === 'saved') {
                title.innerText = "Bookmarks";
                searchBox.classList.remove('active');
                topicScroll.style.display = 'none';
            } else {
                title.innerText = "For You";
                searchBox.classList.remove('active');
                topicScroll.style.display = 'flex';
                document.getElementById('searchInput').value = '';
            }

            currentCategory = 'All';
            document.querySelectorAll('.topic-pill').forEach(el => el.classList.remove('active'));
            document.querySelector('.topic-pill').classList.add('active');
            applyFilters();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Boot
        async function bootApp() {
            try {
                await initDB();
                await loadData();
                applyFilters();
            } catch (err) {
                feedContainer.innerHTML = `<div class="empty-state"><h3>Database Error</h3><p>${err}</p></div>`;
            }
        }
        bootApp();
    </script>
